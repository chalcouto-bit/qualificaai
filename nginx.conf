# ─────────────────────────────────────────────────
# QualificaAI Nginx Configuration
# Coloque este arquivo em: /etc/nginx/sites-available/qualificaai
# e faça o link: sudo ln -s /etc/nginx/sites-available/qualificaai /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────

server {
    listen 80;
    server_name SEU_DOMINIO_OU_IP;   # ← Substituir pelo IP ou domínio da VPS
    return 301 https://$host$request_uri;   # Redireciona HTTP → HTTPS (remover se não usar SSL)
}

server {
    listen 443 ssl;
    server_name SEU_DOMINIO_OU_IP;   # ← Substituir pelo IP ou domínio da VPS

    # ── SSL (Let's Encrypt) ─────────────────────────────
    # Gerado automaticamente pelo Certbot. Descomentar após rodar certbot.
    # ssl_certificate /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem;

    # ── Frontend (React Build Estático) ─────────────────
    root /var/www/qualificaai/frontend/dist;
    index index.html;

    # SPA fallback: todas as rotas vão para o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API (Proxy Reverso) ──────────────────────
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # ── Assets com Cache Longo ──────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Segurança ───────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
