version: '3.8'

services:
  # ── Backend Node.js/Express ──────────────────────────────────
  backend:
    build: ./backend
    container_name: qualificaai-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:80}
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend React + Nginx ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_URL: /api
    container_name: qualificaai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      # BACKEND_URL é usado pelo Nginx em runtime para fazer proxy de /api/
      # No docker-compose local: http://backend:3001
      # No EasyPanel: use o nome interno do serviço backend (ex: http://backend:3001)
      - BACKEND_URL=${BACKEND_URL:-http://backend:3001}
    depends_on:
      backend:
        condition: service_healthy
